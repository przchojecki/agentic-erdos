<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Erdős Browser</title>
    <link rel="stylesheet" href="browser.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar panel">
        <div class="sidebar-header">
          <div class="sidebar-title-row">
            <a
              class="github-link"
              href="https://github.com/przchojecki/agentic-erdos"
              target="_blank"
              rel="noreferrer"
              aria-label="Open GitHub repository"
              title="GitHub repository"
            >
              <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M8 0C3.58 0 0 3.73 0 8.33c0 3.68 2.29 6.8 5.47 7.9.4.08.55-.18.55-.4 0-.2-.01-.87-.01-1.57-2.01.45-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.56-.01-.57.63-.01 1.08.6 1.23.85.72 1.27 1.87.91 2.33.69.07-.54.28-.91.5-1.12-1.78-.21-3.64-.91-3.64-4.05 0-.9.31-1.64.82-2.22-.08-.21-.36-1.05.08-2.18 0 0 .67-.22 2.2.85.64-.19 1.32-.29 2-.29s1.36.1 2 .29c1.53-1.07 2.2-.85 2.2-.85.44 1.13.16 1.97.08 2.18.51.58.82 1.31.82 2.22 0 3.15-1.87 3.84-3.65 4.05.29.26.54.76.54 1.54 0 1.11-.01 2-.01 2.28 0 .22.15.49.55.4A8.36 8.36 0 0 0 16 8.33C16 3.73 12.42 0 8 0Z"
                />
              </svg>
            </a>
            <h1>Erdős Problems</h1>
          </div>
          <input id="search" type="search" placeholder="Search EP, status, keyword..." />
        </div>
        <div id="problemList" class="problem-list"></div>
      </aside>

      <main class="content">
        <section class="panel overview">
          <div class="overview-top">
            <div>
              <h2 id="problemTitle">Select a problem</h2>
            </div>
          </div>

          <div class="overview-flow">
            <section class="section-line">
              <h3>Problem Statement</h3>
              <div id="statement" class="text-block"></div>
            </section>
            <section class="section-line">
              <h3>Literature</h3>
              <div id="literature" class="text-block"></div>
            </section>
            <section class="section-line">
              <h3>Approaches / Proven</h3>
              <div id="approachProven" class="text-block"></div>
            </section>
          </div>
        </section>

        <section class="panel notes">
          <div class="tabs">
            <button class="tab active" data-tab="notesTab">Comments / Notes</button>
            <button class="tab" data-tab="compTab">Computations</button>
          </div>
          <div id="notesTab" class="tab-panel active">
            <div id="noteRaw" class="note-raw"></div>
          </div>
          <div id="compTab" class="tab-panel">
            <div id="computations" class="computations"></div>
          </div>
        </section>
      </main>
    </div>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"]
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"]
          ]
        }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="browser.js"></script>
  </body>
</html>
